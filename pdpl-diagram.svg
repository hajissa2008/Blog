<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200" font-family="'Segoe UI',system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="mainGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a7a6e"/>
      <stop offset="50%" stop-color="#3c9"/>
      <stop offset="100%" stop-color="#273470"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#99d633"/>
      <stop offset="40%" stop-color="#3c9"/>
      <stop offset="100%" stop-color="#273470"/>
    </linearGradient>
  </defs>

  <rect width="500" height="200" fill="#f5f6f5" rx="0"/>

  <!-- Geometric icon (simplified SDAIA-style hexagonal/crystal) -->
  <g transform="translate(30, 40)">
    <!-- Outer hexagon -->
    <polygon points="40,0 80,23 80,69 40,92 0,69 0,23" fill="none" stroke="url(#iconGrad)" stroke-width="2.5" opacity=".6"/>
    <!-- Inner diamond -->
    <polygon points="40,15 68,46 40,77 12,46" fill="url(#iconGrad)" opacity=".15"/>
    <polygon points="40,15 68,46 40,77 12,46" fill="none" stroke="url(#iconGrad)" stroke-width="1.5" opacity=".5"/>
    <!-- Center lines -->
    <line x1="40" y1="15" x2="40" y2="77" stroke="url(#iconGrad)" stroke-width="1" opacity=".3"/>
    <line x1="12" y1="46" x2="68" y2="46" stroke="url(#iconGrad)" stroke-width="1" opacity=".3"/>
    <!-- Small decorative dots -->
    <circle cx="40" cy="8" r="2.5" fill="#3c9" opacity=".5"/>
    <circle cx="40" cy="84" r="2.5" fill="#273470" opacity=".5"/>
    <circle cx="76" cy="46" r="2" fill="#3c9" opacity=".4"/>
    <circle cx="4" cy="46" r="2" fill="#273470" opacity=".4"/>
  </g>

  <!-- PDPL text (bold, large) -->
  <text x="150" y="80" font-size="48" font-weight="800" fill="#1a1e24" letter-spacing="4">PDPL</text>
  <text x="150" y="108" font-size="13" fill="#5b646a" letter-spacing="2">PERSONAL DATA PROTECTION LAW</text>

  <!-- Decorative line -->
  <line x1="150" y1="120" x2="400" y2="120" stroke="url(#mainGrad)" stroke-width="2" opacity=".3"/>

  <!-- Subtext row -->
  <text x="150" y="145" font-size="11" fill="#8a929b" letter-spacing="1.5">Kingdom of Saudi Arabia</text>
  <text x="150" y="165" font-size="11" fill="#8a929b" letter-spacing="1.5">Saudi Data &amp; AI Authority — SDAIA</text>
</svg>