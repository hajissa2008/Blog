<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 820" font-family="'Space Grotesk','Segoe UI',system-ui,sans-serif">
  <defs>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4d6975"/>
      <stop offset="22%" stop-color="#4d6975"/>
      <stop offset="45%" stop-color="#b6720f"/>
      <stop offset="62%" stop-color="#b6720f"/>
      <stop offset="82%" stop-color="#a8362d"/>
      <stop offset="100%" stop-color="#a8362d"/>
    </linearGradient>
  </defs>

  <rect width="760" height="820" fill="#f5f6f5" rx="0"/>

  <!-- Header -->
  <text x="40" y="52" font-size="11.5" font-family="'Space Mono',monospace" fill="#8a9197" letter-spacing="2">HOW THE FAILURE UNFOLDS</text>
  <text x="40" y="82" font-size="22" font-weight="600" fill="#14171b" letter-spacing="-0.3">Six steps from kickoff to a stalled go-live</text>

  <!-- Vertical line -->
  <rect x="61" y="100" width="2" height="660" rx="1" fill="url(#lineGrad)"/>

  <!-- Step 1 -->
  <g transform="translate(40,100)">
    <circle cx="22" cy="22" r="20" fill="#fff" stroke="#4d6975" stroke-width="2"/>
    <text x="22" y="27" text-anchor="middle" font-size="15" font-weight="700" font-family="'Space Mono',monospace" fill="#4d6975">1</text>
    <rect x="64" y="0" width="636" height="90" rx="14" fill="#fff" stroke="rgba(20,23,27,.12)" stroke-width="1"/>
    <circle cx="80" cy="22" r="4" fill="#4d6975"/>
    <text x="91" y="26" font-size="11" font-weight="700" font-family="'Space Mono',monospace" fill="#4d6975" letter-spacing="1.3">SCOPE</text>
    <text x="80" y="48" font-size="18" font-weight="600" fill="#14171b">The goal is set too vague</text>
    <text x="80" y="70" font-size="16.5" fill="#5b646a">"Modernize operations." No line drawn between what changes and what doesn't.</text>
  </g>

  <!-- Step 2 -->
  <g transform="translate(40,220)">
    <circle cx="22" cy="22" r="20" fill="#fff" stroke="#4d6975" stroke-width="2"/>
    <text x="22" y="27" text-anchor="middle" font-size="15" font-weight="700" font-family="'Space Mono',monospace" fill="#4d6975">2</text>
    <rect x="64" y="0" width="636" height="90" rx="14" fill="#fff" stroke="rgba(20,23,27,.12)" stroke-width="1"/>
    <circle cx="80" cy="22" r="4" fill="#4d6975"/>
    <text x="91" y="26" font-size="11" font-weight="700" font-family="'Space Mono',monospace" fill="#4d6975" letter-spacing="1.3">SCOPE</text>
    <text x="80" y="48" font-size="18" font-weight="600" fill="#14171b">Every team loads its wishlist</text>
    <text x="80" y="70" font-size="16.5" fill="#5b646a">With no clear boundary, there's no principled basis to say no to anything.</text>
  </g>

  <!-- Step 3 -->
  <g transform="translate(40,340)">
    <circle cx="22" cy="22" r="20" fill="#fff" stroke="#b6720f" stroke-width="2"/>
    <text x="22" y="27" text-anchor="middle" font-size="15" font-weight="700" font-family="'Space Mono',monospace" fill="#b6720f">3</text>
    <rect x="64" y="0" width="636" height="90" rx="14" fill="#fff" stroke="rgba(20,23,27,.12)" stroke-width="1"/>
    <circle cx="80" cy="22" r="4" fill="#b6720f"/>
    <text x="91" y="26" font-size="11" font-weight="700" font-family="'Space Mono',monospace" fill="#b6720f" letter-spacing="1.3">SPONSORSHIP</text>
    <text x="80" y="48" font-size="18" font-weight="600" fill="#14171b">The sponsor delegates the hard calls</text>
    <text x="80" y="70" font-size="16.5" fill="#5b646a">A name on the org chart facilitates workshops instead of deciding.</text>
  </g>

  <!-- Step 4 -->
  <g transform="translate(40,460)">
    <circle cx="22" cy="22" r="20" fill="#fff" stroke="#b6720f" stroke-width="2"/>
    <text x="22" y="27" text-anchor="middle" font-size="15" font-weight="700" font-family="'Space Mono',monospace" fill="#b6720f">4</text>
    <rect x="64" y="0" width="636" height="90" rx="14" fill="#fff" stroke="rgba(20,23,27,.12)" stroke-width="1"/>
    <circle cx="80" cy="22" r="4" fill="#b6720f"/>
    <text x="91" y="26" font-size="11" font-weight="700" font-family="'Space Mono',monospace" fill="#b6720f" letter-spacing="1.3">SPONSORSHIP</text>
    <text x="80" y="48" font-size="18" font-weight="600" fill="#14171b">Conflicts get baked into the build</text>
    <text x="80" y="70" font-size="16.5" fill="#5b646a">Unresolved cross-team disputes fossilize into contradictory configuration.</text>
  </g>

  <!-- Step 5 -->
  <g transform="translate(40,580)">
    <circle cx="22" cy="22" r="20" fill="#a8362d" stroke="#a8362d" stroke-width="2"/>
    <text x="22" y="27" text-anchor="middle" font-size="15" font-weight="700" font-family="'Space Mono',monospace" fill="#fff">5</text>
    <rect x="64" y="0" width="636" height="90" rx="14" fill="#fff" stroke="#a8362d" stroke-width="1.5"/>
    <circle cx="80" cy="22" r="4" fill="#a8362d"/>
    <text x="91" y="26" font-size="11" font-weight="700" font-family="'Space Mono',monospace" fill="#a8362d" letter-spacing="1.3">CHANGE READINESS</text>
    <text x="80" y="48" font-size="18" font-weight="600" fill="#14171b">Change is left to last-minute training</text>
    <text x="80" y="70" font-size="16.5" fill="#5b646a">People never adapt, so the old spreadsheets and workarounds quietly survive.</text>
  </g>

  <!-- Step 6 -->
  <g transform="translate(40,700)">
    <circle cx="22" cy="22" r="20" fill="#a8362d" stroke="#a8362d" stroke-width="2"/>
    <text x="22" y="27" text-anchor="middle" font-size="15" font-weight="700" font-family="'Space Mono',monospace" fill="#fff">6</text>
    <rect x="64" y="0" width="636" height="90" rx="14" fill="#fff" stroke="#a8362d" stroke-width="1.5"/>
    <circle cx="80" cy="22" r="4" fill="#a8362d"/>
    <text x="91" y="26" font-size="11" font-weight="700" font-family="'Space Mono',monospace" fill="#a8362d" letter-spacing="1.3">GO-LIVE</text>
    <text x="80" y="48" font-size="18" font-weight="600" fill="#14171b">The failure finally surfaces</text>
    <text x="80" y="70" font-size="16.5" fill="#5b646a">Bad data loads, a broken integration, a month-end that takes three weeks.</text>
  </g>

  <!-- Caption -->
  <text x="104" y="790" font-size="12" font-family="'Space Mono',monospace" fill="#8a9197">Steps 1–4 are decided in the first weeks. The cost stays invisible until step 6 — which is why go-live gets the blame for a failure set in motion at kickoff.</text>
</svg>
